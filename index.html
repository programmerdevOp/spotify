<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player : music for everyone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="navbar">
        <div class="nav-left">
            <div class="spotify-img">
                <img class="spotify-img" src="spotifyblack.png" alt="" style="height: 43px; width: 45px;"/>
            </div>

            <div class="home-ico">
                <i class="fa-solid fa-house"></i>
            </div>
        </div>
        <div class="nav-center">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="what do you want to play" />
            <i class="fa-regular fa-folder"></i>
        </div>
        <div class="nav-right">
            <a href="#">Premium</a>
            <a href="#">Support</a>
            <a href="#">Download</a>
            <span class="divider"></span>
            <a href="#"><i class="fa-solid fa-download"></i> Install</a>
            <a href="#">Sign up</a>
            <button class="login-btn">Log-in</button>
        </div>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="nav">
                <h4>Your Library</h4>
                <button class="badge">
                    <i class="fa-solid fa-plus"></i>
                    Create
                </button>
            </div>

            <div class="lib-box">
                <div class="box">
                    <p class="box-p1">Create your first playlist</p>
                    <p class="box-p2">It's easy, we'll help you</p>
                    <button class="badge-b">Create Playlist</button>
                </div>

                <div class="box">
                    <p class="box-p1">Lets find some podcast to follow</p>
                    <p class="box-p2">we'll keep you updated to new episodes</p>    

                    <button class="badge-b">
                        Browse Podcast
                    </button>
                </div>
            </div>
        </div>
        <div class="main-content">Main Content</div>
        <div class="music-player">Music Player</div>
    </div>
</body>
</html>
